<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Himanshu Legendary Coder</title>
    <style>
        .box {
            position: relative;
            left: 50px;
            top: 30px;
            background-color: blue;
            padding: 20px;
            width: 200px;
        }
    </style>
</head>

<body>
    <h1>Relative Positioning.</h1>
    <p><b>Original Position (Before Applying Relative) :</b></p>
    <div class="original">
        This is the Normal Position of the Box.
    </div>
    <br>
    <p><b>After Applying Relative Positioning :</b></p>
    <div class="box">
        This Box is Moved Using Relative Positioning.
    </div>
</body>

</html>
