<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video, Audio & Media in HTML</title>
</head>

<body>
    <video src="Legendary Video.mp4" height="255" controls loop muted poster="Legendary Image.jpeg"></video>
    <audio src="Legendary Audio.mp3" controls autoplay loop muted></audio>
    <svg height="100" width="100">
        <circle cx="50" cy="50" r="40" stroke="black" stroke-width="3" fill="red" />
    </svg>
    <img src="IMG.svg" alt="My Svg Image">
    <!-- <iframe src="https://www.codewithharry.com/tutorial/html-iframes/" width="322" height="444" frameborder="0"></iframe> -->
    <iframe width="560" height="315" src="https://www.youtube.com/embed/XZwBNDGuWGU?si=7dizOo1JaiHSvMAE&amp;start=770"
        title="YouTube video player" frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>

</html>
