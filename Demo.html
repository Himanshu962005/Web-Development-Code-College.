<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Transform By Himanshu Legendary Coder.</title>
    <link rel="stylesheet" href="Style5.css">
</head>

<body>
    <div class="wrap">
        <!-- Scale X : Scales the Element on the X - Axis. -->
        <div class="box">
            <div class="blue scaleX">
                Scale X.
            </div>
        </div>
        <!-- Scale Y : Scales the Element on the Y - Axis. -->
        <div class="box">
            <div class="blue scaleY">
                Scale Y.
            </div>
        </div>
        <!-- Scale : Scales the Element on Both the X - Axis and Y - Axis. -->
        <div class="box">
            <div class="blue scale">
                Scale.
            </div>
        </div>
        <!-- Translate X : Moves the Element Along the X - Axis. -->
        <div class="box">
            <div class="blue translateX">
                Translate X.
            </div>
        </div>
        <!-- Translate Y : Moves the Element Along the Y - Axis. -->
        <div class="box">
            <div class="blue translateY">
                Translate Y.
            </div>
        </div>
        <!-- Translate : Moves the Element Along Both the X - Axis and Y - Axis. -->
        <div class="box">
            <div class="blue translate">
                Translate.
            </div>
        </div>
        <!-- Matrix: A 2D Transformation Method using a Matrix of Six Values. -->
        <div class="box">
            <div class="blue matrix">
                Matrix.
            </div>
        </div>
        <!-- Rotate : Rotates the Element Around the Z - Axis. -->
        <div class="box">
            <div class="blue rotate">
                Rotate.
            </div>
        </div>
        <!-- Skew : Skews the Element on the X - Axis and Y - Axis. -->
        <div class="box">
            <div class="blue skew">
                Skew.
            </div>
        </div>
        <!-- Skew X : Skews the Element on the X - Axis. -->
        <div class="box">
            <div class="blue skewX">
                Skew X.
            </div>
        </div>
        <!-- Skew Y : Skews the Element on the Y - Axis. -->
        <div class="box">
            <div class="blue skewY">
                Skew Y.
            </div>
        </div>
        <!-- Matrix 3D : A 3D Transformation Method using a Matrix of 16 Values. -->
        <div class="box">
            <div class="blue matrix3d">
                Matrix 3D.
            </div>
        </div>
        <!-- Translate 3D : Moves the Element Along the X - Axis, Y - Axis, and Z - Axis. -->
        <div class="box">
            <div class="blue translate3d">
                Translate 3D.
            </div>
        </div>
        <!-- Rotate Y : Rotates the Element Around the Y - Axis. -->
        <div class="box">
            <div class="blue rotateY">
                Rotate Y.
            </div>
        </div>
        <!-- Rotate X : Rotates the Element Around the X - Axis. -->
        <div class="box">
            <div class="blue rotateX">
                Rotate X.
            </div>
        </div>
        <!-- Translate Z : Moves the Element Along the Z - Axis. -->
        <div class="box">
            <div class="blue translateZ">
                Translate Z.
            </div>
        </div>
    </div>
</body>

</html>
