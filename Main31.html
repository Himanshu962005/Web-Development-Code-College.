<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Himanshu Legendary Coder</title>
</head>

<body>
    <h1>Student Registration Form.</h1>
    <form>
        First Name :
        <input type="text" name="fname">
        <br><br>
        Last Name :
        <input type="text" name="lname">
        <br><br>
        Email :
        <input type="email" name="email">
        <br><br>
        Mobile No :
        <input type="tel" name="mobile" maxlength="10">
        <br><br>
        Password :
        <input type="password" name="password">
        <br><br>
        Date of Birth :
        <input type="date" name="dob">
        <br><br>
        Gender :
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
        <input type="radio" name="gender"> Other
        <br><br>
        Hobbies :
        <input type="checkbox"> BeyBlading
        <input type="checkbox"> Fighting
        <input type="checkbox"> Mobile Gaming
        <input type="checkbox"> PC Gaming
        <input type="checkbox"> PSP Gaming
        <input type="checkbox"> Anime Watching
        <br><br>
        Course :
        <select name="course">
            <option>Select Course</option>
            <option>M.Tech</option>
            <option>ME</option>
            <option>MCA</option>
            <option>Msc</option>
            <option>B.Tech</option>
            <option>ME</option>
            <option>BCA</option>
            <option>Bsc</option>
        </select>
        <br><br>
        Address :
        <br>
        <textarea rows="4" cols="30"></textarea>
        <br><br>
        Upload Photo :
        <input type="file">
        <br><br>
        City :
        <input type="text" name="city">
        <br><br>
        State :
        <input type="text" name="state">
        <br><br>
        Pincode :
        <input type="number" name="pincode">
        <br><br>
        <input type="submit" value="Register">
        <input type="reset" value="Reset">
    </form>
</body>

</html>
