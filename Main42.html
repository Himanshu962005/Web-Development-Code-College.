<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Himanshu Legendary Coder.</title>
    <style>
        /* Element Selector. */
        /* div {
            background-color: red;
        } */

        /* Class Selector. */
        .red {
            background-color: red;
        }

        /* ID Selector. */
        #green {
            background-color: green;
        }

        /* Child  Selectors. */
        div>p {
            color: blue;
            background-color: brown;
        }

        /* Descendant Selector. */
        div p {
            color: blue;
            background-color: brown;
        }

        /* Universal Selector. */
        * {
            margin: 0;
            padding: 0;
        }

        /* Pseudo Selector. */
        a:visited {
            color: yellow;
        }

        a:link {
            color: green;
        }

        a:active {
            background-color: red;
        }

        a:hover {
            background-color: yellow;
        }

        p:first-child {
            background-color: aqua;
        }
    </style>
</head>

<body>
    <main class="One">
        <p>I am First.</p>
        <p>I am Second.</p>
    </main>
    <div class="red">I am a DIV.
        <article>
            <p>I am a Para Inside DIV.</p>
        </article>
    </div>
    <div id="green">I am Another DIV.</div>
    <a href="https://www.Google.com">Go to Google.</a>
    <a href="https://www.Facebook2.com">Go to Facebook.</a>
</body>

</html>
